<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Graduation Cap Icon -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cap top (mortarboard) -->
  <polygon points="50,15 85,30 50,45 15,30" fill="url(#grad1)"/>
  
  <!-- Cap base -->
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="url(#grad1)"/>
  
  <!-- Tassel -->
  <circle cx="85" cy="30" r="6" fill="#c9a959"/>
  <line x1="85" y1="30" x2="85" y2="45" stroke="#c9a959" stroke-width="1.5"/>
  
  <!-- Book (representing education) -->
  <path d="M 25 60 L 50 55 L 75 60 L 75 80 L 50 85 L 25 80 Z" fill="url(#grad1)" stroke="#2c5282" stroke-width="1"/>
  <line x1="50" y1="55" x2="50" y2="85" stroke="#2c5282" stroke-width="1"/>
</svg>
