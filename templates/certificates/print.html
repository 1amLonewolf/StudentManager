<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate - {{ student.name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            padding: 20px;
            font-family: 'Helvetica', 'Arial', sans-serif;
        }

        .certificate-container {
            max-width: 794px; /* A4 portrait width at 96 DPI */
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .certificate {
            position: relative;
            width: 100%;
            height: 1123px; /* A4 portrait height at 96 DPI */
            background-image: url('{{ url_for("static", filename="certificates/template.png") }}');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* Text overlay positions - matching certificate_generator.py */
        .student-name {
            position: absolute;
            top: 62%; /* height * 0.62 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 22pt;
            font-weight: bold;
            color: #000;
            text-align: center;
            width: 60%;
        }

        .start-date {
            position: absolute;
            top: 56%; /* height * 0.56 */
            left: 15%; /* width * 0.15 */
            font-size: 11pt;
            color: #000;
        }

        .completion-date {
            position: absolute;
            top: 56%; /* height * 0.56 */
            left: 42%; /* width * 0.42 */
            font-size: 11pt;
            color: #000;
        }

        .issue-date {
            position: absolute;
            top: 22%; /* height * 0.22 */
            left: 45%; /* width * 0.45 */
            font-size: 11pt;
            color: #000;
        }

        .grade {
            position: absolute;
            top: 14%; /* height * 0.14 */
            left: 28%; /* width * 0.28 */
            font-size: 14pt;
            font-weight: bold;
            color: #1e3a5f;
        }

        .certificate-number {
            position: absolute;
            bottom: 5%; /* height * 0.05 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 8pt;
            color: #808080;
            text-align: center;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .certificate-container {
                box-shadow: none;
                max-width: 100%;
            }

            .no-print {
                display: none !important;
            }

            .certificate {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="no-print" style="text-align: center; margin-bottom: 20px;">
        <button onclick="window.print()" style="padding: 15px 30px; font-size: 16px; background: #1e3a5f; color: white; border: none; cursor: pointer; border-radius: 5px;">
            🖨️ Print Certificate
        </button>
        <button onclick="window.close()" style="padding: 15px 30px; font-size: 16px; background: #666; color: white; border: none; cursor: pointer; border-radius: 5px; margin-left: 10px;">
            Close
        </button>
    </div>

    <div class="certificate-container">
        <div class="certificate">
            <!-- Student Name (centered) -->
            <div class="student-name">{{ student.name }}</div>

            <!-- Training Period Dates -->
            <div class="start-date">{{ student.enrollment_date.strftime('%d %B %Y') if student.enrollment_date else '_______________' }}</div>
            <div class="completion-date">{{ certificate.issue_date.strftime('%d %B %Y') }}</div>

            <!-- Issue Date -->
            <div class="issue-date">{{ certificate.issue_date.strftime('%d %B %Y') }}</div>

            <!-- Overall Grade -->
            <div class="grade">{{ certificate.grade }}</div>

            <!-- Certificate Number -->
            <div class="certificate-number">Certificate No: {{ certificate.certificate_number }}</div>
        </div>
    </div>

    <script>
        // Auto-print on load (optional - uncomment to enable)
        // window.onload = function() { window.print(); }
    </script>
</body>
</html>
